# apiVersion: v1
# kind: Namespace
# metadata:
#   name: falkordb-free-sh
#   labels:
#     name: falkordb-free-sh
# ---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: falkordb-free-sh-gp3
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: ebs.csi.aws.com
parameters:
  type: gp3
  iops: "4000"
  throughput: "250"
  fsType: ext4
  encrypted: "true"
allowVolumeExpansion: true
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain
---
apiVersion: apps.kubeblocks.io/v1
kind: Cluster
metadata:
  name: falkordb-free-sh
  namespace: falkordb-free-sh
spec:
  terminationPolicy: Delete
  clusterDef: falkordb
  topology: cluster

  shardings:
  - name: shard
    shards: 3
    template:
      name: falkordb
      componentDef: falkordb-cluster-4
      serviceVersion: "4.12.5"
      replicas: 2
      disableExporter: false

      systemAccounts:
      - name: default
        secretRef:
          name: falkordb-shared-password
          namespace: falkordb-shared
          password: password

      resources:
        requests:
          cpu: "500m"
          memory: "4Gi"
        limits:
          cpu: "1500m"
          memory: "12Gi"

      schedulingPolicy:
        nodeSelector:
          role: falkordb
        tolerations:
        - key: "workload"
          operator: "Equal"
          value: "falkordb"
          effect: "NoSchedule"
        affinity:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                  - key: app.kubernetes.io/instance
                    operator: In
                    values: ["falkordb-free-sh"]
                topologyKey: kubernetes.io/hostname

      volumeClaimTemplates:
      - name: data
        spec:
          storageClassName: falkordb-free-sh-gp3
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: falkordb-free-sh-exporter
  namespace: falkordb-free-sh
  labels:
    app: falkordb-free-sh-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: falkordb-free-sh-exporter
  template:
    metadata:
      labels:
        app: falkordb-free-sh-exporter
    spec:
      containers:
      - name: redis-exporter
        image: oliver006/redis_exporter:v1.62.0
        args:
        - --redis.addr=$(REDIS_HOST):6379
        - --redis.password=$(REDIS_PASSWORD)
        env:
        - name: REDIS_HOST
          valueFrom:
            secretKeyRef:
              name: falkordb-free-sh-conn-credential
              key: host
              optional: true
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: falkordb-shared-password
              key: password
        ports:
        - name: http-metrics
          containerPort: 9121
          protocol: TCP
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /health
            port: http-metrics
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: http-metrics
          initialDelaySeconds: 5
          periodSeconds: 5
      nodeSelector:
        role: general
---
apiVersion: v1
kind: Service
metadata:
  name: falkordb-free-sh-exporter
  namespace: falkordb-free-sh
  labels:
    app: falkordb-free-sh-exporter
spec:
  type: ClusterIP
  ports:
  - name: http-metrics
    port: 9121
    targetPort: http-metrics
    protocol: TCP
  selector:
    app: falkordb-free-sh-exporter
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: falkordb-free-sh-monitor
  namespace: falkordb-free-sh
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: falkordb-free-sh-exporter
  endpoints:
  - port: http-metrics
    path: /metrics
    interval: 30s
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: falkordb-stats-exporter-script
  namespace: falkordb-free-sh
data:
  exporter.py: |
    #!/usr/bin/env python3
    import os
    import time
    import redis
    from redis.cluster import RedisCluster
    from prometheus_client import start_http_server, Gauge, Counter

    graph_nodes = Gauge('falkordb_graph_nodes_total', 'Total nodes in graph', ['graph', 'shard'])
    graph_edges = Gauge('falkordb_graph_edges_total', 'Total edges in graph', ['graph', 'shard'])
    graph_count = Gauge('falkordb_graphs_total', 'Total number of graphs')
    shard_count = Gauge('falkordb_shards_total', 'Total number of shards')
    scrape_errors = Counter('falkordb_scrape_errors_total', 'Total scrape errors', ['graph'])

    def get_cluster_client():
        return RedisCluster(
            host=os.environ.get('REDIS_HOST', 'localhost'),
            port=int(os.environ.get('REDIS_PORT', 6379)),
            password=os.environ.get('REDIS_PASSWORD', ''),
            decode_responses=True
        )

    def get_node_client(host, port, password):
        return redis.Redis(
            host=host,
            port=port,
            password=password,
            decode_responses=True
        )

    def collect_metrics():
        rc = None
        try:
            password = os.environ.get('REDIS_PASSWORD', '')
            rc = get_cluster_client()

            primaries = [n for n in rc.get_nodes() if n.server_type == 'primary']
            shard_count.set(len(primaries))

            all_graphs = set()
            for idx, node in enumerate(primaries):
                nc = None
                try:
                    nc = get_node_client(node.host, node.port, password)
                    graphs = nc.execute_command('GRAPH.LIST')
                    for graph_name in graphs:
                        all_graphs.add(graph_name)
                        try:
                            result = nc.execute_command('GRAPH.QUERY', graph_name, 'MATCH (n) RETURN count(n)')
                            nodes = result[1][0][0]
                            graph_nodes.labels(graph=graph_name, shard=str(idx)).set(nodes)

                            result = nc.execute_command('GRAPH.QUERY', graph_name, 'MATCH ()-[r]->() RETURN count(r)')
                            edges = result[1][0][0]
                            graph_edges.labels(graph=graph_name, shard=str(idx)).set(edges)
                        except Exception as e:
                            print(f"Error querying graph {graph_name} on shard {idx}: {e}")
                            scrape_errors.labels(graph=graph_name).inc()
                except Exception as e:
                    print(f"Error connecting to shard {idx} ({node.host}:{node.port}): {e}")
                finally:
                    if nc:
                        nc.close()

            graph_count.set(len(all_graphs))

        except Exception as e:
            print(f"Error connecting to Redis Cluster: {e}")
        finally:
            if rc:
                rc.close()

    if __name__ == '__main__':
        port = int(os.environ.get('EXPORTER_PORT', 9122))
        interval = int(os.environ.get('SCRAPE_INTERVAL', 60))

        print(f"Starting FalkorDB sharded stats exporter on port {port}")
        start_http_server(port)

        while True:
            collect_metrics()
            time.sleep(interval)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: falkordb-stats-exporter
  namespace: falkordb-free-sh
  labels:
    app: falkordb-stats-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: falkordb-stats-exporter
  template:
    metadata:
      labels:
        app: falkordb-stats-exporter
    spec:
      containers:
      - name: exporter
        image: python:3.11-slim
        command:
        - /bin/bash
        - -c
        - |
          pip install --quiet redis==5.0.3 prometheus_client==0.20.0 && \
          python /scripts/exporter.py
        env:
        - name: REDIS_HOST
          valueFrom:
            secretKeyRef:
              name: falkordb-free-sh-conn-credential
              key: host
              optional: true
        - name: REDIS_PORT
          value: "6379"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: falkordb-shared-password
              key: password
        - name: EXPORTER_PORT
          value: "9122"
        - name: SCRAPE_INTERVAL
          value: "60"
        ports:
        - name: http-metrics
          containerPort: 9122
          protocol: TCP
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        volumeMounts:
        - name: script
          mountPath: /scripts
        livenessProbe:
          httpGet:
            path: /
            port: http-metrics
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: http-metrics
          initialDelaySeconds: 15
          periodSeconds: 5
      volumes:
      - name: script
        configMap:
          name: falkordb-stats-exporter-script
      nodeSelector:
        role: general
---
apiVersion: v1
kind: Service
metadata:
  name: falkordb-stats-exporter
  namespace: falkordb-free-sh
  labels:
    app: falkordb-stats-exporter
spec:
  type: ClusterIP
  ports:
  - name: http-metrics
    port: 9122
    targetPort: http-metrics
    protocol: TCP
  selector:
    app: falkordb-stats-exporter
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: falkordb-stats-monitor
  namespace: falkordb-free-sh
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: falkordb-stats-exporter
  endpoints:
  - port: http-metrics
    path: /metrics
    interval: 60s
---
apiVersion: v1
kind: Service
metadata:
  name: falkordb-free-sh-gateway
  namespace: falkordb-free-sh
  labels:
    app.kubernetes.io/instance: falkordb-free-sh
spec:
  type: ClusterIP
  ports:
  - name: redis
    port: 6379
    targetPort: 6379
    protocol: TCP
  selector:
    app.kubernetes.io/instance: falkordb-free-sh
    kubeblocks.io/role: primary
