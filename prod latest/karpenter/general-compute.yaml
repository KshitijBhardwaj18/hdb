apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: general-compute
spec:
  role: "KarpenterNodeRole-cortex-prod"
  amiSelectorTerms:
    - alias: "al2023@latest"
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "cortex-prod"
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "cortex-prod"
  metadataOptions:
    httpEndpoint: enabled
    httpProtocolIPv6: disabled
    httpPutResponseHopLimit: 2   # must be 2+ for pods to reach IMDS for IAM credentials
    httpTokens: required
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 30Gi
        volumeType: gp3
        iops: 3000
        throughput: 125
        deleteOnTermination: true
        encrypted: true

---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: general-compute
spec:
  template:
    metadata:
      labels:
        role: milvus-general
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: general-compute
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
            - m6i.large               
            - m6i.xlarge              
            - m6i.2xlarge             
      taints:
        - key: workload
          value: milvus-general
          effect: NoSchedule
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 10m
  limits:
    cpu: "128"
    memory: 512Gi