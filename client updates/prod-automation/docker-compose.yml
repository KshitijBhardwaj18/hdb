version: '3.8'

x-common-env: &common-env
  PYTHONPATH: /app
  MONGODB_URI: ${MONGODB_URI}
  MONGODB_DATABASE: ${MONGODB_DATABASE:-byoc_platform}
  REDIS_URL: redis://redis:6379/0
  PULUMI_BACKEND_URL: ${PULUMI_BACKEND_URL}
  PULUMI_SECRETS_PROVIDER: ${PULUMI_SECRETS_PROVIDER}
  PULUMI_WORK_DIR: /app
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
  AWS_DEFAULT_REGION: ${AWS_REGION:-us-east-1}
  AWS_REGION: ${AWS_REGION:-us-east-1}
  GITHUB_PAT: ${GITHUB_PAT}
  GITHUB_REPO: ${GITHUB_REPO:-opengig/cortex}
  GITHUB_BRANCH: ${GITHUB_BRANCH:-main}
  CONFIG_STORAGE_PATH: /app/config
  CONFIG_ENCRYPTION_KEY: ${CONFIG_ENCRYPTION_KEY:-}
  CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
  JWT_SECRET: ${JWT_SECRET}
  JWT_EXPIRES_IN_HOURS: ${JWT_EXPIRES_IN_HOURS:-168}
  MAX_DEPLOYMENTS_PER_USER: ${MAX_DEPLOYMENTS_PER_USER:-5}
  FALKORDB_PASSWORD: ${FALKORDB_PASSWORD}
  MILVUS_TOKEN: ${MILVUS_TOKEN}
  GRAFANA_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-}
  NEXTJS_NEXTAUTH_SECRET: ${NEXTJS_NEXTAUTH_SECRET:-}
  NEXTJS_GOOGLE_CLIENT_ID: ${NEXTJS_GOOGLE_CLIENT_ID:-}
  NEXTJS_GOOGLE_CLIENT_SECRET: ${NEXTJS_GOOGLE_CLIENT_SECRET:-}
  NEXTJS_AUTH_DYNAMODB_ID: ${NEXTJS_AUTH_DYNAMODB_ID:-}
  NEXTJS_AUTH_DYNAMODB_SECRET: ${NEXTJS_AUTH_DYNAMODB_SECRET:-}
  NEXTJS_AUTH_DYNAMODB_REGION: ${NEXTJS_AUTH_DYNAMODB_REGION:-us-east-1}
  NEXTJS_AWS_CONFIG: ${NEXTJS_AWS_CONFIG:-}
  NEXTJS_MCP_ENCRYPTION_KEY: ${NEXTJS_MCP_ENCRYPTION_KEY:-}
  NEXTJS_RESEND_API_KEY: ${NEXTJS_RESEND_API_KEY:-}
  NEXTJS_STRIPE_SECRET_KEY: ${NEXTJS_STRIPE_SECRET_KEY:-}
  NEXTJS_FRONTEND_CONFIG: ${NEXTJS_FRONTEND_CONFIG:-}
  NEXTJS_NEXTAUTH_URL: ${NEXTJS_NEXTAUTH_URL:-}
  NEXTJS_EMAIL_FROM: ${NEXTJS_EMAIL_FROM:-}

x-common-build: &common-build
  build:
    context: .
    dockerfile: Dockerfile

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  api:
    <<: *common-build
    command: >
      uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 2 --log-level info
    environment:
      <<: *common-env
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    <<: *common-build
    command: >
      celery -A worker.celery_app:celery_app worker --loglevel=info --concurrency=2 --max-tasks-per-child=10 -Q celery
    environment:
      <<: *common-env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery-beat:
    <<: *common-build
    command: >
      celery -A worker.celery_app:celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    environment:
      <<: *common-env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  flower:
    <<: *common-build
    command: >
      celery -A worker.celery_app:celery_app flower --port=5555
      --basic-auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-changeme} --url-prefix=flower
    environment:
      <<: *common-env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./nginx/certs:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    entrypoint:
      "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait
      $${!}; done'"
    restart: unless-stopped

volumes:
  redis-data:
  certbot-webroot:
