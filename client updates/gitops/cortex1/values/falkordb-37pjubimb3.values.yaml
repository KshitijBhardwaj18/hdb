cluster:
  enabled: true
organization: cortex1
tenantId: 37pjubimb3
namespace: falkordb-cortex1
clusterName: falkordb
auth:
  useSharedSecret: true
  sharedSecretName: falkordb-shared-password
  sharedSecretNamespace: falkordb-shared
  sharedSecretKey: password
ingress:
  enabled: true
  domain: "falkordb.hydradb.hydradb.com"
  className: nginx-inc
  useWildcardCert: false
  tls:
    issuerName: selfsigned-issuer
    issuerKind: ClusterIssuer
stunnel:
  image: dweomer/stunnel:latest
  replicas: 2
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
dataNode:
  replicas: 2
  falkordbArgs: MAX_QUEUED_QUERIES 500
  resources:
    requests:
      cpu: 500m
      memory: 4Gi
    limits:
      cpu: 1500m
      memory: 12Gi
  nodeSelector:
    role: memory-db-large-scalable
  tolerations:
  - key: workload
    operator: Equal
    value: database-large-scalable
    effect: NoSchedule
  storage:
    storageClassName: falkordb-prod-gp3
    size: 50Gi
sentinelNode:
  replicas: 3
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  nodeSelector:
    role: general
  storage:
    storageClassName: falkordb-general-gp3
    size: 10Gi
monitoring:
  enabled: true
  redisExporter:
    image: oliver006/redis_exporter:v1.62.0
  statsExporter:
    image: python:3.11-slim
    scrapeInterval: 60
