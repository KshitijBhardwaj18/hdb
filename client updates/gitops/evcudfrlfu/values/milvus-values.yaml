cluster:
  enabled: true
org_id: evcudfrlfu
namespace:
  create: false
storageClass:
  create: false
  name: milvus-storage
  provisioner: ebs.csi.aws.com
  parameters:
    type: gp3
    iops: 3000
    throughput: 125
    fsType: ext4
    encrypted: true
  allowVolumeExpansion: true
  volumeBindingMode: WaitForFirstConsumer
  reclaimPolicy: Retain
nodeSelector:
  role: milvus-general
tolerations:
- key: workload
  operator: Equal
  value: milvus-general
  effect: NoSchedule
queryNodeSelector:
  role: milvus-compute-nvme
queryNodeTolerations:
- key: workload
  operator: Equal
  value: milvus-compute-nvme
  effect: NoSchedule
milvus:
  mode: cluster
  config:
    newSchema: true
    logLevel: info
    authEnabled: true
    maxVectorFieldNum: 10
    queryNode:
      cache:
        warmup: async
        memoryLimit: 4294967296
        readAheadPolicy: willneed
      mmap:
        vectorField: false
        vectorIndex: false
        scalarField: true
        scalarIndex: true
        chunkCache: true
      segcore:
        chunkRows: 4096
        knowhereThreadPoolNumRatio: 4
        interimIndex:
          enableIndex: true
          nlist: 128
          nprobe: 32
    dataCoord:
      segment:
        maxSize: 2048
        sealProportion: 0.12
        expansionRate: 1.25
    common:
      simdType: avx512
      gracefulTime: 5000
      gracefulStopTimeout: 30
  components:
    image: milvusdb/milvus:v2.6.11
    proxy:
      replicas: 2
      serviceType: ClusterIP
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: '2'
          memory: 4Gi
    queryNode:
      replicas: 2
      resources:
        requests:
          cpu: '1'
          memory: 2Gi
        limits:
          cpu: '4'
          memory: 8Gi
    dataNode:
      replicas: 2
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: '4'
          memory: 8Gi
    mixCoord:
      replicas: 1
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: '2'
          memory: 2Gi
    streamingNode:
      replicas: 2
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: '2'
          memory: 4Gi
  dependencies:
    etcd:
      deletionPolicy: Delete
      pvcDeletion: false
      replicaCount: 3
      storageSize: 10Gi
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: '1'
          memory: 2Gi
    s3:
      enabled: true
      region: us-east-1
      bucketName: ''
    msgStream:
      type: woodpecker
ingress:
  className: nginx-inc
  domain: milvusdb.usecortex.ai
  tlsSecretName: ''
  grpc:
    enabled: true
    proxyConnectTimeout: 60s
    proxyReadTimeout: 600s
    proxySendTimeout: 600s
    annotations: {}
  webui:
    enabled: true
    proxyConnectTimeout: 60s
    proxyReadTimeout: 300s
    proxySendTimeout: 300s
    clientMaxBodySize: 100m
    annotations: {}
  attu:
    enabled: true
    proxyConnectTimeout: 60s
    proxyReadTimeout: 300s
    proxySendTimeout: 300s
    clientMaxBodySize: 100m
    annotations: {}
attu:
  enabled: true
  replicas: 1
  image:
    repository: zilliz/attu
    tag: v2.4
  logLevel: info
  nodeSelector:
    role: milvus-attu
  tolerations:
  - key: workload
    operator: Equal
    value: milvus-attu
    effect: NoSchedule
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
certificate:
  create: true
  issuerRef:
    name: letsencrypt-dns01-milvus
    kind: ClusterIssuer
  duration: 2160h
  renewBefore: 360h
clusterIssuer:
  create: false
  name: letsencrypt-dns01-milvus
  email: cloud@usecortex.ai
  server: https://acme-v02.api.letsencrypt.org/directory
  privateKeySecretRef: letsencrypt-dns01-milvus-key
  cloudflare:
    apiTokenSecretName: cloudflare-api-token-milvus
    apiTokenKey: api-token
monitoring:
  enabled: true
  releaseLabel: monitoring
  interval: 30s
