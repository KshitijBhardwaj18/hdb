{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nextjs-secrets
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: nextjs
spec:
  refreshInterval: "5m"
  secretStoreRef:
    name: {{ .Values.externalSecret.storeName | default "aws-secrets-manager" }}
    kind: ClusterSecretStore
  target:
    name: nextjs-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: {{ .Values.externalSecret.secretPath }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
{{- end }}
