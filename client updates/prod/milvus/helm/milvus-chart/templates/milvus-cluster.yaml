{{- if .Values.cluster.enabled }}
apiVersion: milvus.io/v1beta1
kind: Milvus
metadata:
  name: {{ .Values.org_id }}
  namespace: {{ include "milvus-tenant.namespace" . }}
  labels:
    {{- include "milvus-tenant.labels" . | nindent 4 }}
spec:
  mode: {{ .Values.milvus.mode }}

  config:
  {{- if .Values.milvus.config.newSchema }}
    log:
      level: {{ .Values.milvus.config.logLevel }}
    common:
      simdType: {{ .Values.milvus.config.common.simdType | default "avx512" }}
      gracefulTime: {{ .Values.milvus.config.common.gracefulTime | default 5000 }}
      gracefulStopTimeout: {{ .Values.milvus.config.common.gracefulStopTimeout | default 30 }}
      security:
        authorizationEnabled: {{ .Values.milvus.config.authEnabled }}

    queryNode:
      cache:
        warmup: {{ .Values.milvus.config.queryNode.cache.warmup | default "async" }}
        memoryLimit: {{ .Values.milvus.config.queryNode.cache.memoryLimit | default 4294967296 }}
        readAheadPolicy: {{ .Values.milvus.config.queryNode.cache.readAheadPolicy | default "willneed" }}
      mmap:
        vectorField: false
        vectorIndex: false
        scalarField: true
        scalarIndex: true
        chunkCache: true
      segcore:
        chunkRows: {{ .Values.milvus.config.queryNode.segcore.chunkRows | default 4096 }}
        knowhereThreadPoolNumRatio: {{ .Values.milvus.config.queryNode.segcore.knowhereThreadPoolNumRatio | default 4 }}
        interimIndex:
          enableIndex: true
          nlist: {{ .Values.milvus.config.queryNode.segcore.interimIndex.nlist | default 128 }}
          nprobe: {{ .Values.milvus.config.queryNode.segcore.interimIndex.nprobe | default 32 }}

    dataCoord:
      segment:
        maxSize: {{ .Values.milvus.config.dataCoord.segment.maxSize | default 2048 }}
        sealProportion: {{ .Values.milvus.config.dataCoord.segment.sealProportion | default 0.12 }}
        expansionRate: {{ .Values.milvus.config.dataCoord.segment.expansionRate | default 1.25 }}

    {{- if and .Values.milvus.dependencies.s3 .Values.milvus.dependencies.s3.enabled }}
    minio:
      bucketName: {{ .Values.milvus.dependencies.s3.bucketName | default (printf "milvus-%s" .Values.org_id) }}
      rootPath: milvus
      useSSL: true
      useIAM: true
      cloudProvider: aws
    {{- end }}

    proxy:
      maxVectorFieldNum: {{ .Values.milvus.config.maxVectorFieldNum | default 10 }}

  {{- else }}
    milvus:
      log:
        level: {{ .Values.milvus.config.logLevel }}
      common:
        security:
          authorizationEnabled: {{ .Values.milvus.config.authEnabled }}
    {{- if and .Values.milvus.dependencies.s3 .Values.milvus.dependencies.s3.enabled }}
    minio:
      bucketName: {{ .Values.milvus.dependencies.s3.bucketName | default (printf "milvus-%s" .Values.org_id) }}
      rootPath: milvus
      useSSL: true
      useIAM: true
      cloudProvider: aws
    {{- end }}
    proxy:
      maxVectorFieldNum: {{ .Values.milvus.config.maxVectorFieldNum | default 10 }}
  {{- end }}

  components:
    disableMetric: false
    {{- if .Values.milvus.components.image }}
    image: {{ .Values.milvus.components.image }}
    {{- end }}
    enableRollingUpdate: true
    imageUpdateMode: rollingUpgrade

    {{- if .Values.nodeSelector }}
    nodeSelector:
      {{- toYaml .Values.nodeSelector | nindent 6 }}
    {{- end }}
    {{- if .Values.tolerations }}
    tolerations:
      {{- toYaml .Values.tolerations | nindent 6 }}
    {{- end }}

    proxy:
      replicas: {{ .Values.milvus.components.proxy.replicas }}
      resources:
        {{- toYaml .Values.milvus.components.proxy.resources | nindent 8 }}
      serviceType: {{ .Values.milvus.components.proxy.serviceType }}

    queryNode:
      replicas: {{ .Values.milvus.components.queryNode.replicas }}
      {{- if .Values.queryNodeSelector }}
      nodeSelector:
        {{- toYaml .Values.queryNodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.queryNodeTolerations }}
      tolerations:
        {{- toYaml .Values.queryNodeTolerations | nindent 8 }}
      {{- end }}
      {{- if .Values.milvus.config.newSchema }}
      volumeMounts:
        - mountPath: /var/lib/milvus/data
          name: nvme-data
      volumes:
        - name: nvme-data
          emptyDir:
            sizeLimit: 200Gi
      {{- end }}
      resources:
        {{- toYaml .Values.milvus.components.queryNode.resources | nindent 8 }}

    dataNode:
      replicas: {{ .Values.milvus.components.dataNode.replicas }}
      resources:
        {{- toYaml .Values.milvus.components.dataNode.resources | nindent 8 }}

    {{- if .Values.milvus.components.indexNode }}
    indexNode:
      replicas: {{ .Values.milvus.components.indexNode.replicas }}
      resources:
        {{- toYaml .Values.milvus.components.indexNode.resources | nindent 8 }}
    {{- end }}

    mixCoord:
      replicas: {{ .Values.milvus.components.mixCoord.replicas }}
      resources:
        {{- toYaml .Values.milvus.components.mixCoord.resources | nindent 8 }}

    {{- if .Values.milvus.components.streamingNode }}
    streamingNode:
      replicas: {{ .Values.milvus.components.streamingNode.replicas }}
      resources:
        {{- toYaml .Values.milvus.components.streamingNode.resources | nindent 8 }}
    {{- end }}

  dependencies:
    etcd:
      inCluster:
        deletionPolicy: {{ .Values.milvus.dependencies.etcd.deletionPolicy }}
        pvcDeletion: {{ .Values.milvus.dependencies.etcd.pvcDeletion }}
        values:
          replicaCount: {{ .Values.milvus.dependencies.etcd.replicaCount }}
          {{- if .Values.nodeSelector }}
          nodeSelector:
            {{- toYaml .Values.nodeSelector | nindent 12 }}
          {{- end }}
          {{- if .Values.tolerations }}
          tolerations:
            {{- toYaml .Values.tolerations | nindent 12 }}
          {{- end }}
          persistence:
            enabled: true
            storageClass: {{ include "milvus-tenant.storageClassName" . }}
            size: {{ .Values.milvus.dependencies.etcd.storageSize }}
          resources:
            {{- toYaml .Values.milvus.dependencies.etcd.resources | nindent 12 }}

    {{- if and .Values.milvus.dependencies.s3 .Values.milvus.dependencies.s3.enabled }}
    storage:
      external: true
      type: S3
      endpoint: s3.{{ .Values.milvus.dependencies.s3.region }}.amazonaws.com:443
      secretRef: milvus-iam-secret
    {{- else }}
    storage:
      inCluster:
        deletionPolicy: {{ .Values.milvus.dependencies.minio.deletionPolicy }}
        pvcDeletion: {{ .Values.milvus.dependencies.minio.pvcDeletion }}
        values:
          mode: {{ .Values.milvus.dependencies.minio.mode }}
          replicas: {{ .Values.milvus.dependencies.minio.replicas }}
          {{- if .Values.nodeSelector }}
          nodeSelector:
            {{- toYaml .Values.nodeSelector | nindent 12 }}
          {{- end }}
          {{- if .Values.tolerations }}
          tolerations:
            {{- toYaml .Values.tolerations | nindent 12 }}
          {{- end }}
          persistence:
            enabled: true
            storageClass: {{ include "milvus-tenant.storageClassName" . }}
            size: {{ .Values.milvus.dependencies.minio.storageSize }}
          resources:
            {{- toYaml .Values.milvus.dependencies.minio.resources | nindent 12 }}
    {{- end }}

    msgStreamType: {{ .Values.milvus.dependencies.msgStream.type }}
    {{- if eq .Values.milvus.dependencies.msgStream.type "pulsar" }}
    pulsar:
      inCluster:
        deletionPolicy: {{ .Values.milvus.dependencies.pulsar.deletionPolicy }}
        pvcDeletion: {{ .Values.milvus.dependencies.pulsar.pvcDeletion }}
        values:
          {{- if .Values.nodeSelector }}
          nodeSelector:
            {{- toYaml .Values.nodeSelector | nindent 12 }}
          {{- end }}
          {{- if .Values.tolerations }}
          tolerations:
            {{- toYaml .Values.tolerations | nindent 12 }}
          {{- end }}
          components:
            autorecovery: false
          proxy:
            replicaCount: {{ .Values.milvus.dependencies.pulsar.proxy.replicas }}
            resources:
              {{- toYaml .Values.milvus.dependencies.pulsar.proxy.resources | nindent 14 }}
          bookkeeper:
            replicaCount: {{ .Values.milvus.dependencies.pulsar.bookkeeper.replicas }}
            resources:
              {{- toYaml .Values.milvus.dependencies.pulsar.bookkeeper.resources | nindent 14 }}
            volumes:
              journal:
                size: {{ .Values.milvus.dependencies.pulsar.bookkeeper.journalSize }}
                storageClassName: {{ include "milvus-tenant.storageClassName" . }}
              ledgers:
                size: {{ .Values.milvus.dependencies.pulsar.bookkeeper.ledgersSize }}
                storageClassName: {{ include "milvus-tenant.storageClassName" . }}
          zookeeper:
            replicaCount: {{ .Values.milvus.dependencies.pulsar.zookeeper.replicas }}
            resources:
              {{- toYaml .Values.milvus.dependencies.pulsar.zookeeper.resources | nindent 14 }}
            volumes:
              data:
                size: {{ .Values.milvus.dependencies.pulsar.zookeeper.storageSize }}
                storageClassName: {{ include "milvus-tenant.storageClassName" . }}
          broker:
            replicaCount: {{ .Values.milvus.dependencies.pulsar.broker.replicas }}
            resources:
              {{- toYaml .Values.milvus.dependencies.pulsar.broker.resources | nindent 14 }}
    {{- end }}
{{- end }}
