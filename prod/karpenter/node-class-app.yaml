apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: cortex-app
spec:
  role: "KarpenterNodeRole-cortex-prod"
  amiSelectorTerms:
    - alias: "al2023@latest"
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "cortex-prod"
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "cortex-prod"
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 100Gi
        volumeType: gp3
        iops: 3000
        throughput: 125
        deleteOnTermination: true
